{% if finalCta %}
	<section class="final-cta">
		<div class="container">
			<div class="final-cta__inner">
				<div class="final-cta__content">
					{% if finalCta.eyebrow %}
						<p class="eyebrow">{{ finalCta.eyebrow }}</p>
					{% endif %}

					<h2>{{ finalCta.title }}</h2>
					<p>{{ finalCta.text }}</p>
				</div>

				<div class="final-cta__actions">
					<a class="button button--primary" href="#contact">{{ finalCta.primaryCta }}</a>
					<a class="button button--ghost" href="mailto:{{ contact.email }}">{{ finalCta.secondaryCta }}</a>
				</div>
			</div>
		</div>
	</section>
{% endif %}
